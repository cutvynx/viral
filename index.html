<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Profile Viewer</title>

<style>
body {
    margin:0;
    font-family: Arial;
    background:black;
    color:white;
    text-align:center;
}

.container {
    margin-top:50px;
}

img {
    width:120px;
    border-radius:50%;
    box-shadow:0 0 20px #ff00cc;
}

h1 { margin:10px; }

p { color:#ccc; }

.btn {
    padding:12px 25px;
    border-radius:50px;
    background:linear-gradient(45deg,#ff0066,#ffcc00);
    color:white;
    text-decoration:none;
    display:inline-block;
    margin-top:15px;
}
</style>
</head>

<body>

<div class="container">
    <img id="dp" src="" alt="profile">
    <h1 id="username">@loading...</h1>
    <p id="bio">Loading bio...</p>
    <p id="followers">Followers: ...</p>

    <a href="https://www.instagram.com/arctic.soulx" target="_blank" class="btn">
        👉 Open Instagram
    </a>
</div>

<script>
fetch("https://www.instagram.com/arctic.soulx/?__a=1&__d=dis")
.then(res => res.json())
.then(data => {
    let user = data.graphql.user;

    document.getElementById("dp").src = user.profile_pic_url_hd;
    document.getElementById("username").innerText = "@" + user.username;
    document.getElementById("bio").innerText = user.biography;
    document.getElementById("followers").innerText =
        "Followers: " + user.edge_followed_by.count;
})
.catch(()=>{
    document.getElementById("bio").innerText = "Failed to load data 😢";
});
</script>

</body>
</html>
